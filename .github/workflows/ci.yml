name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  backend:
    name: backend-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore ExpenseTracker.sln

      - name: Build
        run: dotnet build ExpenseTracker.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test ExpenseTracker.Tests/ExpenseTracker.Tests.csproj --configuration Release --no-build

  frontend:
    name: frontend-lint-build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: expense-tracker-web/package-lock.json

      - name: Install
        working-directory: expense-tracker-web
        run: npm ci

      - name: Lint
        working-directory: expense-tracker-web
        run: npm run lint

      - name: Build
        working-directory: expense-tracker-web
        run: npm run build
